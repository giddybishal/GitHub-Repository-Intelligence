services:
  api:
    build: .
    container_name: github-repo-intel-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - ollama
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data: